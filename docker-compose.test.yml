version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reputations_bot_test
      POSTGRES_USER: reputations_user
      POSTGRES_PASSWORD: reputations_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reputations_user -d reputations_bot_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: test_token
      BOT_ID: 0
      LOG_LEVEL: INFO
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: reputations_bot_test
      POSTGRES_USER: reputations_user
      POSTGRES_PASSWORD: reputations_password
      SQLALCHEMY_ECHO: "false"
      TEST_DATABASE_URL: postgresql+asyncpg://reputations_user:reputations_password@postgres:5432/reputations_bot_test
    command: >
      sh -c "alembic upgrade head && pytest -m integration -q"
